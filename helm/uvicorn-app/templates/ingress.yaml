{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "uvicorn-app.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.className }}"
    kubernetes.io/ingress.regional-static-ip-name: "{{ .Values.ingress.staticIpName }}"
spec:
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "uvicorn-app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
